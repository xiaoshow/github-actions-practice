name: API Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Newman
        run: npm install -g newman

      - name: Run API Tests
        run: newman run "My Collection.postman_collection4.json" --env-var "base_url=https://api.github.com" --env-var "github_token=${{ secrets.GITHUB_TOKEN }}"
